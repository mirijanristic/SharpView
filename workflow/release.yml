name: Release

# Objavljuje release kada gurnes tag oblika v1.0.0
# Rucno pokretanje (workflow_dispatch) pravi iste artefakte bez release-a.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Verzija za probni build (bez v)'
        required: true
        default: '0.0.1'

permissions:
  contents: write

env:
  PROJECT: src/SharpView/SharpView.csproj

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Odredi verziju
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $v = '${{ github.event.inputs.version }}'
          } else {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          }
          if ($v -notmatch '^\d+\.\d+\.\d+') {
            throw "Neispravna verzija: '$v' (ocekivano npr. 1.0.0)"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Verzija: $v"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }} -r win-x64

      - name: Test
        run: dotnet test -c Release

      # ----------------------------------------------------------------------
      # Meta 1: framework-dependent -> ide u instaler.
      # ~3 MB. Instaler sam preuzme .NET Desktop Runtime ako ga korisnik nema.
      # ----------------------------------------------------------------------
      - name: Publish (framework-dependent)
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishReadyToRun=true
          -p:PublishSingleFile=false
          -p:DebugType=none
          -p:SatelliteResourceLanguages=en
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      # ----------------------------------------------------------------------
      # Meta 2: self-contained -> ide u portable ZIP.
      # Veci je, ali radi na masini bez ijedne instalirane zavisnosti.
      # ----------------------------------------------------------------------
      - name: Publish (self-contained)
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishReadyToRun=true
          -p:PublishSingleFile=false
          -p:DebugType=none
          -p:SatelliteResourceLanguages=en
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish-sc

      - name: Portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish-sc\* `
            -DestinationPath "dist\SharpView-${{ steps.ver.outputs.version }}-win-x64-portable.zip"

      - name: Instaliraj Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Napravi instaler
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.ver.outputs.version }} `
            installer\SharpView.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC je vratio $LASTEXITCODE" }

      - name: SHA256 sume
        shell: pwsh
        working-directory: dist
        run: |
          Get-ChildItem -File -Exclude SHA256SUMS.txt | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          } | Out-File -Encoding ascii SHA256SUMS.txt
          Get-Content SHA256SUMS.txt

      - name: Objavi release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = Get-ChildItem dist -File | ForEach-Object { $_.FullName }
          gh release create ${{ github.ref_name }} $files `
            --title "SharpView ${{ steps.ver.outputs.version }}" `
            --generate-notes

      # Kod rucnog pokretanja nema release-a, samo artefakti za provjeru
      - name: Sacuvaj artefakte
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: sharpview-${{ steps.ver.outputs.version }}
          path: dist/
          retention-days: 14
